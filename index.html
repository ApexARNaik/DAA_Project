<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAA Project: Recursive Org Chart</title>
    <style>
        /* High-end bluish-black dark mode aesthetics */
        body {
            margin: 0;
            padding: 2rem;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0b101e 0%, #1a1528 100%);
            color: #e2e8f0;
            min-height: 100vh;
        }

        h1 {
            text-align: center;
            color: #60a5fa;
            text-shadow: 0 0 10px rgba(96, 165, 250, 0.3);
            margin-bottom: 2rem;
        }

        /* Glassmorphism Containers with high-contrast borders */
        .panel {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(148, 163, 184, 0.3);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        h2 {
            margin-top: 0;
            font-size: 1.2rem;
            color: #93c5fd;
            border-bottom: 1px solid rgba(148, 163, 184, 0.2);
            padding-bottom: 0.5rem;
        }

        /* Input Table Styling */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1rem;
        }

        td {
            padding: 0.5rem;
        }

        input {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid #475569;
            color: #f8fafc;
            padding: 0.5rem;
            border-radius: 6px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #60a5fa;
        }

        /* Button Styling */
        .btn {
            background: #2563eb;
            color: white;
            border: 1px solid #60a5fa;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.85rem;
        }

        .btn:hover {
            background: #3b82f6;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }

        .btn-add {
            background: transparent;
            border: 1px dashed #475569;
            color: #94a3b8;
            width: 100%;
            margin-bottom: 1rem;
        }

        .btn-add:hover {
            border-color: #94a3b8;
            color: #f8fafc;
            background: rgba(255, 255, 255, 0.05);
        }

        /* Output & Stats Styling */
        pre {
            background: #0f172a;
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid #334155;
            overflow-x: auto;
            font-family: 'Courier New', Courier, monospace;
            color: #a78bfa;
            line-height: 1.5;
            min-height: 200px;
        }
        /* D3 Tree Styling */
        #tree-container {
            width: 100%;
            max-height: 75vh;
            display: block; /* Removed flex center to prevent left-side truncation on overflow */
            overflow: auto;
        }

        .node circle {
            fill: rgba(15, 23, 42, 0.8);
            stroke: #60a5fa;
            stroke-width: 3px;
            transition: all 0.3s ease;
        }

        .node text {
            font-size: 14px;
            fill: #e2e8f0;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            font-weight: 500;
        }

        .link {
            fill: none;
            stroke: rgba(148, 163, 184, 0.4);
            stroke-width: 2px;
        }
    </style>
    <!-- D3.js for Data Visualization -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>

<body>

    <h1>Recursive Organization Chart Traversal</h1>

    <div class="grid-container">
        <div class="panel">
            <h2>Input Panel (N-ary Tree Data)</h2>
            <details style="margin-bottom: 1rem;">
                <summary style="cursor: pointer; color: #93c5fd; font-weight: bold; margin-bottom: 0.5rem;">View / Edit Employees List</summary>
                <div style="max-height: 250px; overflow-y: auto; border: 1px solid rgba(148, 163, 184, 0.2); border-radius: 6px; padding: 0.5rem; background: rgba(15, 23, 42, 0.3);">
                    <table id="emp-table">
                        <tr>
                            <td><input type="text" placeholder="Name" value="Alice"></td>
                            <td><input type="text" placeholder="Role" value="CEO"></td>
                            <td><input type="text" placeholder="Manager" value="ROOT"></td>
                        </tr>
                        <tr>
                            <td><input type="text" placeholder="Name" value="Bob"></td>
                            <td><input type="text" placeholder="Role" value="VP Engineering"></td>
                            <td><input type="text" placeholder="Manager" value="Alice"></td>
                        </tr>
                        <tr>
                            <td><input type="text" placeholder="Name" value="Grace"></td>
                            <td><input type="text" placeholder="Role" value="Engineer"></td>
                            <td><input type="text" placeholder="Manager" value="Bob"></td>
                        </tr>
                    </table>
                </div>
            </details>

            <button class="btn btn-add" onclick="addRow()">+ Add Employee Row</button>
            <input type="file" id="fileUpload" accept=".csv,.txt" style="display: none;" onchange="handleFileUpload(event)">
            <button class="btn btn-add" onclick="document.getElementById('fileUpload').click()">📁 Upload CSV/TXT File</button>
            <button class="btn" style="width: 100%;" onclick="runTraversal()">Run DFS Traversal</button>
        </div>

        <div class="panel">
            <details open>
                <summary style="cursor: pointer; color: #93c5fd; font-size: 1.2rem; font-weight: bold; border-bottom: 1px solid rgba(148, 163, 184, 0.2); padding-bottom: 0.5rem; margin-bottom: 0.5rem;">Traversal Output & Complexity Stats</summary>
                <pre id="output">Results will appear here...</pre>
            </details>
        </div>
    </div>

    <!-- Visualization Panel -->
    <div class="panel" style="margin-top: 1.5rem;">
        <h2 style="display: flex; justify-content: space-between; align-items: center;">
            Tree Visualization (Pre-order DFS)
            <button class="btn" style="font-size: 0.8rem; padding: 0.4rem 0.8rem;" onclick="downloadJPEG()">Export as JPEG</button>
        </h2>
        <div id="tree-container"></div>
    </div>

    <script>
        // UI Logic to add dynamic rows to the input panel
        function addRow() {
            const table = document.getElementById("emp-table");
            const row = table.insertRow();
            row.innerHTML = `
                <td><input type="text" placeholder="Name"></td>
                <td><input type="text" placeholder="Role"></td>
                <td><input type="text" placeholder="Manager"></td>
            `;
        }

        // Logic to handle CSV file upload
        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const text = e.target.result;
                const lines = text.split('\n');
                
                const table = document.getElementById("emp-table");
                table.innerHTML = ""; // Clear existing rows

                lines.forEach(line => {
                    const cleanLine = line.trim();
                    if (!cleanLine) return;
                    
                    // Basic split by comma (can handle CSV formats)
                    // If your file has '|' as separator, change the split character
                    let parts = cleanLine.split(','); 
                    if (parts.length < 3) parts = cleanLine.split('|'); // Fallback to pipe

                    if (parts.length >= 3) {
                        const row = table.insertRow();
                        row.innerHTML = `
                            <td><input type="text" placeholder="Name" value="${parts[0].trim()}"></td>
                            <td><input type="text" placeholder="Role" value="${parts[1].trim()}"></td>
                            <td><input type="text" placeholder="Manager" value="${parts[2].trim()}"></td>
                        `;
                    }
                });

                // Re-build tree data immediately after uploading
                const treeData = buildTreeData();
                if(treeData) updateTree(treeData);
                
                // Automatically collapse the details view for large uploads to save space
                document.querySelector("details").removeAttribute("open");
            };
            reader.readAsText(file);
            // Reset input so the same file can be uploaded again if needed
            event.target.value = "";
        }

        // JS <-> Flask Bridge (Exact PRD Implementation)
        async function runTraversal() {
            // Build tree data for D3 before executing the flask logic
            const treeData = buildTreeData();
            if (treeData) {
                updateTree(treeData);
            }

            // 1. Collect rows from the input table
            const rows = document.querySelectorAll("#emp-table tr");
            const parts = [];

            rows.forEach(row => {
                const cells = row.querySelectorAll("input");
                const name = cells[0].value.trim();
                const role = cells[1].value.trim();
                const mgr = cells[2].value.trim();

                // Construct the pipe-delimited string
                if (name && role && mgr) {
                    parts.push(`${name},${role},${mgr}`);
                }
            });

            const inputStr = parts.join(" | ");
            document.getElementById("output").textContent = "Computing traversal...";

            // Trigger Animation based on the tree we just built
            if (treeData) {
                const rootNode = d3.hierarchy(treeData);
                // Animate tree traversal without awaiting so that Flask can run in parallel
                animateTraversal(rootNode);
            }

            try {
                // 2. Call Flask API
                const res = await fetch("http://localhost:5000/traverse", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ input: inputStr })
                });

                const data = await res.json();

                // 3. Display result
                document.getElementById("output").textContent = data.result ?? data.error;
            } catch (err) {
                document.getElementById("output").textContent = "Error: Ensure Flask server is running on localhost:5000\n" + err;
            }
        }

        // --- D3 Visualization Logic ---

        function buildTreeData() {
            const rows = document.querySelectorAll("#emp-table tr");
            const employees = [];
            rows.forEach(row => {
                const cells = row.querySelectorAll("input");
                const name = cells[0].value.trim();
                const role = cells[1].value.trim();
                const mgr = cells[2].value.trim();
                if (name) {
                    employees.push({ name, role, mgr });
                }
            });

            // Find root (manager is ROOT or someone not in list)
            const root = employees.find(e => e.mgr.toUpperCase() === 'ROOT' || !employees.some(m => m.name === e.mgr));
            if (!root) return null;

            const buildNode = (emp) => {
                const children = employees.filter(e => e.mgr === emp.name).map(buildNode);
                return { name: emp.name, role: emp.role, children: children.length ? children : undefined };
            };

            return buildNode(root);
        }

        let svg, treeLayout;

        function updateTree(treeData) {
            d3.select("#tree-container").selectAll("*").remove();
            
            const margin = {top: 50, right: 60, bottom: 50, left: 60};
            
            const root = d3.hierarchy(treeData);
            
            // Dynamic height based on tree depth
            const depth = d3.max(root.descendants(), d => d.depth) || 1;
            const minHeight = depth * 160; // 160px vertical spacing per level
            const height = Math.max(minHeight, 450) - margin.top - margin.bottom;
            
            // Dynamic width based on number of leaf nodes to prevent overlap
            const minWidth = root.leaves().length * 130; // Increased spacing slightly
            const width = Math.max(minWidth, window.innerWidth - 100) - margin.left - margin.right;

            svg = d3.select("#tree-container").append("svg")
                .attr("width", width + margin.left + margin.right)
                .attr("height", height + margin.top + margin.bottom)
                .style("overflow", "visible")
                .append("g")
                .attr("transform", "translate(" + margin.left + "," + margin.top + ")");
                
            treeLayout = d3.tree().size([width, height]);
            treeLayout(root);

            // Add Links
            svg.selectAll(".link")
                .data(root.links())
                .enter().append("path")
                .attr("class", "link")
                .attr("fill", "none")
                .attr("stroke", "rgba(148, 163, 184, 0.4)")
                .attr("stroke-width", "2px")
                .attr("d", d3.linkVertical()
                    .x(function(d) { return d.x; })
                    .y(function(d) { return d.y; })
                );

            // Add Nodes
            const node = svg.selectAll(".node")
                .data(root.descendants())
                .enter().append("g")
                .attr("class", "node")
                .attr("id", function(d) { return "node-" + d.data.name.replace(/\s+/g, '-'); })
                .attr("transform", function(d) { return "translate(" + d.x + "," + d.y + ")"; });

            // Node Circles
            node.append("circle")
                .attr("r", 45) // Increased from 35
                .attr("fill", "rgba(15, 23, 42, 0.8)")
                .attr("stroke", "#60a5fa")
                .attr("stroke-width", "3px");

            // Node Text (Name)
            node.append("text")
                .attr("dy", "-0.5em")
                .attr("text-anchor", "middle")
                .attr("fill", "#e2e8f0")
                .style("font-size", "14px")
                .style("font-weight", "500")
                .text(function(d) { return d.data.name; });
                
            // Node Text (Role - Multi-line wrapping)
            node.append("text")
                .attr("text-anchor", "middle")
                .style("font-size", "11px")
                .style("fill", "#94a3b8")
                .each(function(d) {
                    const el = d3.select(this);
                    const words = d.data.role ? d.data.role.split(/\s+/) : [];
                    let initialDy = 1.0;
                    words.forEach((word, i) => {
                        el.append("tspan")
                          .attr("x", 0)
                          .attr("dy", i === 0 ? initialDy + "em" : "1.1em")
                          .text(word);
                    });
                });
        }

        function preOrderDFS(node, path = []) {
            if (!node) return path;
            path.push(node.data.name);
            if (node.children) {
                node.children.forEach(child => preOrderDFS(child, path));
            }
            return path;
        }

        async function animateTraversal(rootNode) {
            const path = preOrderDFS(rootNode);
            
            // Reset node styling before animating
            d3.selectAll(".node circle")
                .transition().duration(200)
                .style("fill", "rgba(15, 23, 42, 0.8)")
                .style("stroke", "#60a5fa")
                .style("box-shadow", "none");

            for (let i = 0; i < path.length; i++) {
                const name = path[i].replace(/\s+/g, '-');
                const nodeEl = d3.select("#node-" + name + " circle");
                
                // Highlight current active node (orange glow)
                nodeEl.transition().duration(400)
                      .style("fill", "#f59e0b")
                      .style("stroke", "#fbbf24")
                      .attr("r", 50); // Increased glow size
                      
                await new Promise(r => setTimeout(r, 800));
                
                // Set node to visited state (green)
                nodeEl.transition().duration(400)
                      .style("fill", "rgba(16, 185, 129, 0.3)")
                      .style("stroke", "#34d399")
                      .attr("r", 45); // Restore to new base size
            }
        }
        
        // Render initial tree on load
        window.onload = () => {
            const treeData = buildTreeData();
            if(treeData) updateTree(treeData);
        };

        // Export SVG to JPEG
        function downloadJPEG() {
            const svgNode = document.querySelector("#tree-container svg");
            if (!svgNode) {
                alert("No tree to export! Run the traversal first.");
                return;
            }

            const svgClone = svgNode.cloneNode(true);
            const width = parseInt(svgClone.getAttribute("width"));
            const height = parseInt(svgClone.getAttribute("height"));

            // Inject dark background matching the theme
            const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
            rect.setAttribute("width", "100%");
            rect.setAttribute("height", "100%");
            rect.setAttribute("fill", "#0b101e"); 
            svgClone.insertBefore(rect, svgClone.firstChild);

            const svgData = new XMLSerializer().serializeToString(svgClone);
            const svgBlob = new Blob([svgData], {type: "image/svg+xml;charset=utf-8"});
            const url = URL.createObjectURL(svgBlob);
            
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement("canvas");
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext("2d");
                ctx.drawImage(img, 0, 0);
                URL.revokeObjectURL(url);
                
                const jpegUrl = canvas.toDataURL("image/jpeg", 0.95);
                
                const a = document.createElement("a");
                a.download = "org_chart.jpg";
                a.href = jpegUrl;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            };
            img.src = url;
        }
    </script>
</body>

</html>
